<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - الصفحة غير موجودة</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.error-container{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;background:linear-gradient(135deg,var(--primary),var(--primary-light))}
.error-box{background:white;border-radius:var(--radius);padding:60px 40px;box-shadow:var(--shadow-hover);max-width:500px;width:100%}
.error-icon{font-size:6rem;color:var(--primary);margin-bottom:20px}
.error-box h1{font-size:3rem;color:var(--primary);margin-bottom:10px}
.error-box p{color:var(--text2);margin-bottom:30px;font-size:1.1rem}
</style>
</head>
<body>
<div class="error-container">
<div class="error-box">
<div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
<h1>404</h1>
<p>عذراً، الصفحة التي تبحث عنها غير موجودة</p>
<a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> العودة للرئيسية</a>
</div>
<div style="margin-top:30px;color:rgba(255,255,255,0.8);text-align:center">
<p>منصة التسليم الأكاديمية - كلية العلاج الطبيعي جامعة قنا</p>
<p style="font-size:0.9rem;margin-top:10px">برمجة وتطوير: عبدالله صبري</p>
</div>
</div>
</body>
</html>
