<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة المرور - منصة التسليم الأكاديمية</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-container">
<div class="auth-card">
<div class="auth-logo">
<div class="logo-icon"><i class="fas fa-key"></i></div>
<h1>استعادة كلمة المرور</h1>
<p>أدخل بياناتك لاستلام رابط إعادة التعيين</p>
</div>
<div id="alert-container"></div>
<form onsubmit="handleForgot(event)">
<div class="form-group">
<label>الرقم القومي</label>
<div class="input-wrapper">
<i class="fas fa-id-card input-icon"></i>
<input type="text" class="form-control" id="nationalId" maxlength="14" placeholder="14 رقم" required>
</div>
</div>
<div class="form-group">
<label>البريد الإلكتروني</label>
<div class="input-wrapper">
<i class="fas fa-envelope input-icon"></i>
<input type="email" class="form-control" id="email" placeholder="example@email.com" required>
</div>
</div>
<button type="submit" class="btn btn-primary" id="btn"><i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة</button>
</form>
<div style="text-align:center;margin-top:20px">
<a href="../index.html" style="color:var(--primary-light);text-decoration:none"><i class="fas fa-arrow-right"></i> العودة لتسجيل الدخول</a>
</div>
</div>
</div>
<script src="../js/app.js"></script>
<script>
function handleForgot(e){
e.preventDefault();
const nid=document.getElementById('nationalId').value.trim();
const email=document.getElementById('email').value.trim();
const btn=document.getElementById('btn');
btn.classList.add('btn-loading');btn.disabled=true;
setTimeout(()=>{
const res=Auth.forgot(nid,email);
if(res.success){
Utils.showAlert('alert-container','تم إرسال رابط إعادة التعيين. في بيئة الإنتاج، سيتم إرساله فعلياً إلى بريدك. رمز الاستعادة للتجربة: '+res.token,'success');
document.getElementById('nationalId').value='';document.getElementById('email').value='';
}else{
Utils.showAlert('alert-container',res.msg,'danger');
}
btn.classList.remove('btn-loading');btn.disabled=false;
},1000);
}
</script>
</body>
</html>
