<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور - منصة التسليم الأكاديمية</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-container">
<div class="auth-card">
<div class="auth-logo">
<div class="logo-icon"><i class="fas fa-lock"></i></div>
<h1>إعادة تعيين كلمة المرور</h1>
<p>أدخل كلمة المرور الجديدة</p>
</div>
<div id="alert-container"></div>
<form onsubmit="handleReset(event)">
<div class="form-group">
<label>كلمة المرور الجديدة</label>
<div class="input-wrapper">
<i class="fas fa-lock input-icon"></i>
<input type="password" class="form-control" id="pwd" placeholder="6 أحرف على الأقل" required minlength="6">
<button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
</div>
<div class="password-strength"><div class="password-strength-bar" id="bar"></div></div>
<div class="password-strength-text" id="txt"></div>
</div>
<div class="form-group">
<label>تأكيد كلمة المرور</label>
<div class="input-wrapper">
<i class="fas fa-lock input-icon"></i>
<input type="password" class="form-control" id="confirm" placeholder="أعد إدخال كلمة المرور" required>
<button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
</div>
</div>
<button type="submit" class="btn btn-primary" id="btn"><i class="fas fa-save"></i> حفظ كلمة المرور</button>
</form>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/app.js"></script>
<script>
const urlParams=new URLSearchParams(window.location.search);const token=urlParams.get('token');
if(!token){document.getElementById('alert-container').innerHTML='<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i><span>رابط غير صالح</span></div>';}
document.getElementById('pwd').addEventListener('input',function(){
if(this.value.length>0){const s=Utils.pwdStrength(this.value);document.getElementById('bar').style.width=s.w;document.getElementById('bar').style.background=s.c;document.getElementById('txt').textContent='قوة: '+s.t;document.getElementById('txt').style.color=s.c;}
else{document.getElementById('bar').style.width='0';document.getElementById('txt').textContent='';}
});
function handleReset(e){
e.preventDefault();if(!token){Utils.showAlert('alert-container','رابط غير صالح','danger');return;}
const p=document.getElementById('pwd').value;const c=document.getElementById('confirm').value;
if(p!==c){Utils.showAlert('alert-container','كلمتا المرور غير متطابقتين','warning');return;}
const btn=document.getElementById('btn');btn.classList.add('btn-loading');btn.disabled=true;
setTimeout(()=>{
const res=Auth.reset(token,p);
if(res.success){Utils.showAlert('alert-container',res.msg+' <a href="../index.html">تسجيل الدخول</a>','success');}
else{Utils.showAlert('alert-container',res.msg,'danger');btn.classList.remove('btn-loading');btn.disabled=false;}
},1000);
}
</script>
</body>
</html>
